<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420, initial-scale=1.0, user-scalable=no">
<title>Spotify OBS Overlay</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <svg class="spotify-logo" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    <h1>Spotify OBS Overlay</h1>
    <p>Authorise once to display your currently playing song</p>
    <button id="login-btn" onclick="startLogin()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
      </svg>
      Connect with Spotify
    </button>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="hidden">
  <!-- Blurred background -->
  <div id="bg-blur"></div>
  <div id="bg-color"></div>

  <div id="widget">
    <!-- Status badge -->
    <div id="status-badge">
      <i id="status-icon" class="fa-solid fa-music"></i>
      <span id="status-text">Now Playing</span>
    </div>
    <!-- Album Art -->
    <div id="album-art-wrap">
      <img id="album-art" src="" alt="Album Art">
      <div id="album-glow"></div>
    </div>

    <!-- Info -->
    <div id="track-info">
      <div id="title-wrap">
        <div id="track-title-inner">
          <span id="track-title">—</span>
        </div>
      </div>
      <div id="track-artist">—</div>

      <!-- Progress -->
      <div id="progress-wrap">
        <div id="progress-bar-bg">
          <div id="progress-bar-fill">
            <div id="progress-dot"></div>
          </div>
        </div>
        <div id="progress-times">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Paused indicator -->
  <div id="paused-badge" class="hidden">
    <span>⏸ Paused</span>
  </div>
</div>

<!-- Config panel (only visible outside OBS) -->
<div id="config-panel">
  <label>Client ID:</label>
  <input type="text" id="client-id-input" placeholder="Your Spotify Client ID" />
  <button onclick="saveClientId()">Save & Login</button>
  <a href="#" onclick="logout()">Logout</a>
</div>

<script src="script.js"></script>
</body>
</html>
